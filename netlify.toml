# ─────────────────────────────────────────────────────────────
# Sé Música · Netlify — DESPLIEGUE ESTÁTICO (sin build)
#
# El sitio es 100% estático: HTML + CSS + JS servidos tal cual.
# El contenido para buscadores ya está escrito dentro de cada
# página (bloques <noscript> indexables), así que NO se necesita
# ningún proceso de build, ni Node, ni Chrome/Puppeteer.
#
# Resultado: despliegues instantáneos y a prueba de fallos.
# Imposible que falle por "Chrome no encontrado" o por timeout.
#
# Funciona igual conectando el repositorio Git a Netlify o
# arrastrando la carpeta: en ambos casos se publican los archivos
# tal cual, sin compilar nada.
# ─────────────────────────────────────────────────────────────

[build]
  # Sin comando de build: publicamos los archivos directamente.
  publish = "."

# ── Redirecciones 301 reforzadas (force=true → se aplican siempre) ──
# Garantía extra para las rutas heredadas de Wix: aunque exista cualquier
# archivo o caché de borde con ese nombre, la redirección manda.
# (El archivo _redirects también las contiene; esto es cinturón y tirantes.)
[[redirects]]
  from = "/inicio"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/e-learning-musical"
  to = "/"
  status = 301
  force = true

# Cabeceras de caché para los recursos estáticos (rendimiento).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
