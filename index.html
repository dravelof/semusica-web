    <main>
      <h1>Tecnologías digitales para la formación humana</h1>
      <p>Sé Música diseña, implementa y acompaña soluciones digitales de aprendizaje para empresas, instituciones educativas y organizaciones culturales.</p>
      <p>Desarrollamos aulas virtuales, cursos e-learning a medida, diseño instruccional, producción multimedia y experiencias formativas centradas en las personas.</p>
      <p><img src="assets/og-cover.png" alt="Sé Música — Tecnologías digitales para la formación humana" width="1200" height="630"></p>

      <section>
        <h2>14 años implementando aprendizaje</h2>
        <p>Pioneros en e-learning en Latinoamérica. Sé Música es una entidad pionera en soluciones de e-learning en Latinoamérica. Desde hace 14 años trascendemos el ámbito musical para brindar servicios de implementación digital a instituciones educativas y corporativas.</p>
        <p>No surgimos de una fascinación técnica por digitalizar contenidos, sino de una pregunta pedagógica más profunda: cómo poner la tecnología al servicio de la persona, evitando que el aprendizaje digital se vuelva consumo pasivo, fragmentación de la atención o simple automatización corporativa.</p>
        <p>Ayudamos a las organizaciones a formar equipos capaces de pensar, sentir, imaginar, decidir y actuar con conciencia en una época tecnológica. <a href="nuestra-historia.html">Conozca nuestra historia y enfoque</a>.</p>
      </section>

      <section>
        <h2>Tres líneas de servicio</h2>
        <p>Cubrimos el ciclo completo de e-learning corporativo: desde la estrategia hasta la operación diaria de las plataformas. Puede contratarnos por servicio o como partner integral.</p>
        <h3>Consultoría y desarrollo de ecosistemas educativos digitales</h3>
        <p>Asesoría personalizada y horas de consultoría para crear o mejorar ecosistemas digitales — asegurando que su empresa esté a la vanguardia en capacitación. <a href="servicio-consultoria.html">Ver servicio</a>.</p>
        <h3>Virtualización de cursos empresariales</h3>
        <p>Transformamos sus programas en multimedia interactivo — guion, ilustración, locución y animación — empaquetado en SCORM. Dos niveles: estándar y avanzado/gamificado. <a href="servicio-virtualizacion.html">Ver servicio</a>.</p>
        <h3>Instalación, soporte y mantenimiento de aulas virtuales</h3>
        <p>Implementamos su aula virtual en la nube, personalizada con su identidad, con soporte técnico y actualizaciones que garantizan operatividad continua. <a href="servicio-aulas-virtuales.html">Ver servicio</a>.</p>
      </section>

      <section>
        <h2>Innovación que construimos sobre su aula — Sé Música Labs</h2>
        <p>Sé Música Labs es nuestra línea de desarrollo de innovación para el aula virtual: módulos propios que amplían lo que su plataforma puede hacer. No son plantillas — los construimos según la operación real de cada institución.</p>
        <h3>Módulo ERP de gestión de capacitaciones</h3>
        <p>Tableros de cumplimiento, asignación de itinerarios, control presupuestal y exportación — toda la gestión académica y operativa integrada en la propia aula virtual, sin saltar entre sistemas. <a href="desarrollo-erp.html">Ver desarrollo</a>.</p>
        <h3>Panel avanzado de perfil de usuario</h3>
        <p>Una vista enriquecida del progreso: competencias, insignias, itinerarios y avance por curso, para que cada persona entienda exactamente dónde está y qué sigue. <a href="desarrollo-perfil.html">Ver desarrollo</a>.</p>
        <h3>Módulo de gestión de matrículas y pensiones</h3>
        <p>Matrículas, cobros y pensiones administrados dentro del aula virtual — sin plataformas externas ni conciliaciones manuales entre sistemas. <a href="desarrollo-matriculas.html">Ver desarrollo</a>.</p>
      </section>

      <section>
        <h2>El e-learning corporativo en Latinoamérica</h2>
        <p>La región vive una transformación acelerada en formación corporativa. La pregunta ya no es si virtualizar — es cómo hacerlo bien.</p>
      </section>

      <section>
        <h2>Docentes formados gratuitamente durante la pandemia</h2>
        <p>Cuando los escenarios cerraron, lanzamos 3 programas de Formación de Competencias Digitales para la Enseñanza Remota.</p>
      </section>

      <section>
        <h2>Confían en nosotros</h2>
        <p>Instituciones educativas y corporativas de toda Latinoamérica implementan su formación digital con nosotros — sin pausar su operación.</p>
        <p>Minsur, Compañía Minera Raura, Unicon, SGS Academy, UPC, Instituto Profesional Projazz, Marcobre, Tottus, Layher, Escuela Moderna de Música y Danza, EMMAT Online y Universidad Nacional de Música.</p>
      </section>

      <section>
        <h2>Seis verticales, una metodología</h2>
        <p>Retail, Construcción, Minería, Servicios financieros, Salud e Industria.</p>
      </section>

      <section>
        <h2>No trabajamos solos</h2>
        <p>Nos rodeamos de aliados que suman conocimiento — neurociencia, ciberseguridad y el gremio que articula el e-learning en el Perú.</p>
        <h3>Institute Of NeuroCoaching</h3>
        <p>Estrategas en transformación organizacional y divulgadores de la neurociencia aplicada al management: diseño de soluciones que convierten el comportamiento humano en resultados de negocio.</p>
        <h3>Security Expert</h3>
        <p>Aliados en ciberseguridad, resiliencia y estrategia para entornos de formación digital seguros.</p>
        <h3>Asociación Peruana de e-Learning (APEL)</h3>
        <p>Miembros fundadores de la APEL, el gremio que articula el e-learning en el Perú.</p>
      </section>

      <section>
        <h2>¿Acaso existe algo más importante que ayudar a formar a un ser humano?</h2>
        <p>Una reunión de diagnóstico de 30 min. Sin venta, sin presión. <a href="index.html#contacto">Conversemos</a>.</p>
      </section>

    </main>
